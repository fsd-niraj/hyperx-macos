<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>HyperX Alloy Origins Core</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #ccc;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 28px;
      user-select: none;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ── Keyboard shell ── */
    .keyboard {
      display: inline-flex;
      align-items: flex-start;
      gap: 10px;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 16px;
    }

    .kb-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .kb-row {
      display: flex;
      gap: 4px;
      height: 38px;
    }

    /* ── Individual key ── */
    .key {
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 0 5px 4px;
      height: 38px;
      background: #252525;
      border: 1px solid #1a1a1a;
      border-top-color: #333;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 500;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      cursor: default;
      flex-shrink: 0;
    }

    /* ── Spacer between key groups (e.g. Esc ↔ F1) ── */
    .kb-gap {
      flex-shrink: 0;
    }

    /* ── Controls bar ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 16px;
      padding: 14px 16px;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      flex-wrap: wrap;
    }

    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .ctrl-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input[type="color"] {
      width: 72px;
      height: 32px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #222;
      cursor: pointer;
      padding: 2px 3px;
    }

    input[type="range"] {
      width: 140px;
      accent-color: #888;
    }

    button {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      color: #999;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover { background: #2a2a2a; border-color: #555; color: #ccc; }

    .divider {
      width: 1px;
      height: 32px;
      background: #2a2a2a;
    }

    #status {
      font-size: 11px;
      color: #555;
      min-height: 16px;
    }
    #status.ok    { color: #4a4; }
    #status.error { color: #c44; }
  </style>
</head>
<body>
  <h1>HyperX Alloy Origins Core</h1>

  <div class="keyboard" id="keyboard">
    <!-- built by renderer.js -->
  </div>

  <div class="controls">
    <div class="ctrl-group">
      <span class="ctrl-label">Color</span>
      <input type="color" id="color-picker" value="#ff0000" />
    </div>

    <div class="ctrl-group">
      <span class="ctrl-label">Brightness</span>
      <input type="range" id="brightness" min="0" max="100" value="100" />
    </div>

    <div class="divider"></div>

    <button id="btn-apply-all">Color All</button>
    <button id="btn-diagnose">Diagnose</button>

    <div id="status"></div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
