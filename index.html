<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>HyperX Alloy Origins Core</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #ccc;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 24px 28px;
      user-select: none;
    }

    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    /* ── Keyboard ── */
    .keyboard {
      display: inline-flex;
      align-items: flex-start;
      gap: 10px;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 16px;
    }
    .kb-section { display: flex; flex-direction: column; gap: 4px; }
    .kb-row     { display: flex; gap: 4px; height: 38px; }

    .key {
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 0 5px 4px;
      height: 38px;
      background: #252525;
      border: 1px solid #1a1a1a;
      border-top-color: #333;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 500;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
    }
    .key:hover  { border-color: #3a3a3a; border-top-color: #444; }
    .key.selected { box-shadow: 0 0 0 2px #fff; z-index: 1; }
    .kb-gap { flex-shrink: 0; }

    /* ── Controls panel ── */
    .controls {
      display: flex;
      align-items: flex-start;
      gap: 0;
      margin-top: 14px;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      overflow: hidden;
    }

    /* ── Color section (wheel + presets) ── */
    .color-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px;
    }

    .color-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    #color-wheel {
      display: block;
      width: 160px;
      height: 160px;
      cursor: crosshair;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Preset swatches */
    .presets {
      display: grid;
      grid-template-columns: repeat(2, 28px);
      gap: 6px;
      align-content: center;
    }
    .swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.1s, transform 0.1s;
    }
    .swatch:hover { border-color: #fff; transform: scale(1.15); }

    /* Hex input row */
    .hex-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .color-preview {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 1px solid #444;
      flex-shrink: 0;
    }
    #hex-input {
      background: #222;
      border: 1px solid #333;
      border-radius: 4px;
      color: #ccc;
      font-size: 12px;
      font-family: 'SF Mono', monospace;
      padding: 4px 8px;
      width: 82px;
    }
    #hex-input:focus { outline: 1px solid #555; }

    /* ── Divider ── */
    .v-divider {
      width: 1px;
      align-self: stretch;
      background: #2a2a2a;
      flex-shrink: 0;
    }

    /* ── Right panel ── */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 16px 18px;
      min-width: 170px;
    }

    .ctrl-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
      display: block;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #888;
      display: block;
    }

    .btn-stack {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    button {
      padding: 7px 12px;
      background: transparent;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      color: #999;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
    }
    button:hover { background: #2a2a2a; border-color: #555; color: #ccc; }
    button.primary {
      border-color: #555;
      color: #ddd;
    }
    button.primary:hover { background: #333; border-color: #888; color: #fff; }

    #status {
      font-size: 11px;
      color: #555;
      min-height: 14px;
    }
    #status.ok    { color: #4a4; }
    #status.error { color: #c44; }

    /* ── Effects panel ── */
    .effects-panel {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 10px;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 12px 16px;
    }

    .fx-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .fx-buttons {
      display: flex;
      gap: 6px;
    }

    button.fx-btn {
      padding: 5px 14px;
      font-size: 11px;
    }

    button.fx-btn.active {
      background: #2e2e2e;
      border-color: #888;
      color: #fff;
    }

    .fx-speed-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      white-space: nowrap;
    }

    .fx-speed-row input[type="range"] {
      width: 80px;
    }
  </style>
</head>
<body>
  <h1>HyperX Alloy Origins Core</h1>

  <div class="keyboard" id="keyboard"></div>

  <div class="controls">

    <!-- Left: color wheel + presets -->
    <div class="color-section">
      <div class="color-row">
        <canvas id="color-wheel" width="160" height="160"></canvas>
        <div class="presets" id="presets"></div>
      </div>
      <div class="hex-row">
        <div class="color-preview" id="color-preview"></div>
        <input type="text" id="hex-input" maxlength="7" value="#ff0000" spellcheck="false" />
      </div>
    </div>

    <div class="v-divider"></div>

    <!-- Right: brightness + actions -->
    <div class="right-panel">
      <div>
        <span class="ctrl-label">Brightness</span>
        <input type="range" id="brightness" min="0" max="100" value="100" />
      </div>
      <div class="btn-stack">
        <button class="primary" id="btn-apply-selected">Apply to Selected</button>
        <button id="btn-apply-all">Color All</button>
        <button id="btn-diagnose">Diagnose</button>
      </div>
      <div id="status"></div>
    </div>

  </div>

  <!-- Effects panel -->
  <div class="effects-panel">
    <span class="fx-label">Effects</span>
    <div class="fx-buttons">
      <button class="fx-btn" data-fx="solid">Solid</button>
      <button class="fx-btn" data-fx="breathing">Breathing</button>
      <button class="fx-btn" data-fx="wave">Wave</button>
      <button class="fx-btn" data-fx="swipe">Swipe</button>
      <button class="fx-btn" data-fx="confetti">Confetti</button>
      <button class="fx-btn" data-fx="hourglass">Hour Glass</button>
    </div>
    <div class="fx-speed-row">
      <span class="fx-label">Speed</span>
      <input type="range" id="fx-speed" min="1" max="10" value="5" />
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
